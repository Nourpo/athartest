<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body{font-family:Arial;margin:0;background:#f5f7fb}
.header{background:#0fb9b1;color:white;padding:16px;text-align:center;font-size:20px}
.card{background:white;margin:16px;padding:16px;border-radius:16px}
button{background:#ff8a00;color:white;border:none;padding:12px;width:100%;border-radius:10px;font-weight:bold}
input{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ddd}
.stat{display:flex;justify-content:space-between;padding:8px}
</style>
</head>
<body>

<div class="header">Athar Attendance</div>

<div class="card">
<div id="reader"></div>
<button onclick="start()">Start Scan</button>
</div>

<div class="card">
<h3>Dashboard</h3>
<div class="stat"><span>Total</span><span id="total">0</span></div>
<div class="stat"><span>Present</span><span id="present">0</span></div>
<div class="stat"><span>Absent</span><span id="absent">0</span></div>
</div>

<div class="card">
<h3>Points</h3>
<input id="id" placeholder="Attendee ID">
<input id="pts" placeholder="Points">
<button onclick="addPoints()">Add</button>
</div>

<script>
const BASE="PUT_DEPLOY_LINK_HERE";

function start(){
 new Html5Qrcode("reader").start(
 { facingMode: "environment" },
 { fps:10 },
 async (txt)=>{
  await fetch(BASE+"?action=checkin&id="+txt);
  loadDash();
 }
 );
}

async function loadDash(){
 const r=await fetch(BASE+"?action=dashboard");
 const d=await r.json();
 total.innerText=d.total;
 present.innerText=d.present;
 absent.innerText=d.absent;
}
loadDash();

async function addPoints(){
 await fetch(BASE,{
 method:"POST",
 body:JSON.stringify({action:"points",id:id.value,points:pts.value})
 });
}
</script>

</body>
</html>
