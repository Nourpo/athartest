<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Athar Attendance System</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      margin-bottom: 16px;
    }
    h1, h2, h3, h4 { margin-top: 0; }
    .muted { color: #667085; }
    .tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .tabs button, button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #111;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .tabs button.secondary, button.secondary {
      background: #e9eef7;
      color: #111;
    }
    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #d8deea;
      margin-top: 10px;
      font-size: 16px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .tab {
      display: none;
    }
    .tab.active {
      display: block;
    }
    #reader {
      width: 100%;
      min-height: 240px;
      overflow: hidden;
      border-radius: 14px;
      background: #000;
      margin-top: 12px;
    }
    .msg {
      margin-top: 12px;
      font-weight: 700;
      min-height: 24px;
    }
    .success { color: #0f9d58; }
    .error { color: #d93025; }
    .warn { color: #b26a00; }
    .person {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #fafcff;
      border: 1px solid #e6ebf2;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .stat {
      background: #f4f7fb;
      padding: 14px;
      border-radius: 14px;
    }
    .stat span {
      display: block;
      color: #667085;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .stat strong {
      font-size: 22px;
    }
    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
    }
    .badge.ok { background: #e8f5e9; color: #137333; }
    .badge.no { background: #fce8e6; color: #c5221f; }
    .badge.warn { background: #fff4e5; color: #9a6700; }
    @media (max-width: 760px) {
      .row, .grid, .stats, .tabs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="card">
      <h1>Athar Attendance System</h1>
      <p class="muted">External organizer panel connected to Google Sheets backend.</p>

      <input id="webAppUrl" placeholder="Paste Apps Script Web App URL here" />
      <input id="accessCode" type="password" placeholder="Access code" />
      <input id="organizerName" placeholder="Organizer name" />
      <button onclick="login()">Login</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="panel" style="display:none;">
      <div class="tabs">
        <button onclick="showTab('scanTab')">Scan</button>
        <button onclick="showTab('searchTab')">Search</button>
        <button onclick="showTab('walkinTab')">Walk-in</button>
        <button onclick="showTab('dashboardTab')">Dashboard</button>
        <button onclick="showTab('pointsTab')">Points</button>
      </div>

      <div id="scanTab" class="tab active">
        <div class="card">
          <h3>Scan QR</h3>
          <div class="row">
            <button onclick="startCamera()">Start Camera</button>
            <button class="secondary" onclick="stopCamera()">Stop Camera</button>
          </div>

          <div id="reader"></div>

          <input id="manualQr" placeholder="Manual QR / Attendee ID" />
          <button onclick="submitManual()">Check in manually</button>

          <div id="scanMsg" class="msg"></div>
          <div id="scanResult"></div>
        </div>
      </div>

      <div id="searchTab" class="tab">
        <div class="card">
          <h3>Search attendee / forgot QR</h3>
          <input id="searchQuery" placeholder="Name / email / phone / ID / team" />
          <button onclick="runSearch()">Search</button>
          <div id="searchResults"></div>
        </div>
      </div>

      <div id="walkinTab" class="tab">
        <div class="card">
          <h3>Walk-in registration</h3>
          <div class="grid">
            <input id="w_name" placeholder="Name" />
            <input id="w_email" placeholder="Email" />
            <input id="w_whatsapp" placeholder="WhatsApp" />
            <input id="w_university" placeholder="University and college" />
            <input id="w_team" placeholder="Team" />
            <input id="w_role" placeholder="Role in event" />
            <input id="w_age" placeholder="Age" />
            <input id="w_gender" placeholder="Gender" />
            <input id="w_government" placeholder="Government" />
            <input id="w_nationalId" placeholder="National ID" />
            <input id="w_educationProfile" placeholder="Education profile" />
          </div>
          <button onclick="submitWalkin()">Register + Check in</button>
          <div id="walkinMsg" class="msg"></div>
          <div id="walkinResult"></div>
        </div>
      </div>

      <div id="dashboardTab" class="tab">
        <div class="card">
          <h3>Dashboard</h3>
          <div class="stats">
            <div class="stat"><span>Total</span><strong id="d_total">0</strong></div>
            <div class="stat"><span>Checked in</span><strong id="d_checkedIn">0</strong></div>
            <div class="stat"><span>Absent</span><strong id="d_absent">0</strong></div>
            <div class="stat"><span>Attendance</span><strong id="d_attendanceRate">0%</strong></div>
            <div class="stat"><span>Absence</span><strong id="d_absenceRate">0%</strong></div>
          </div>

          <h4 style="margin-top:16px;">Latest check-ins</h4>
          <div id="latestList"></div>
          <button onclick="loadDashboard()">Refresh</button>
        </div>
      </div>

      <div id="pointsTab" class="tab">
        <div class="card">
          <h3>Points</h3>
          <input id="p_search" placeholder="Search present attendee" />
          <button onclick="loadPresent()">Load present attendees</button>
          <div id="presentList"></div>

          <div class="grid" style="margin-top:16px;">
            <input id="p_attendeeId" placeholder="Attendee ID" />
            <input id="p_delta" type="number" placeholder="Points (+/-)" />
            <input id="p_reason" placeholder="Reason" />
          </div>
          <button onclick="submitPoints()">Save points</button>
          <div id="pointsMsg" class="msg"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let scanner = null;
    let cameraRunning = false;
    let scanLocked = false;
    let currentRole = null;

    function baseUrl() {
      return document.getElementById("webAppUrl").value.trim();
    }

    function organizerName() {
      return document.getElementById("organizerName").value.trim();
    }

    function setMsg(id, text, type = "") {
      const el = document.getElementById(id);
      el.className = "msg " + type;
      el.textContent = text || "";
    }

    function showTab(id) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = "cb_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        window[callbackName] = function(data) {
          resolve(data);
          cleanup();
        };
        function cleanup() {
          try { delete window[callbackName]; } catch (_) {}
          if (script.parentNode) script.parentNode.removeChild(script);
        }
        const script = document.createElement("script");
        script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + callbackName;
        script.onerror = function() {
          reject(new Error("JSONP request failed"));
          cleanup();
        };
        document.body.appendChild(script);
      });
    }

    async function postJson(data) {
      const res = await fetch(baseUrl(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });
      return res.json();
    }

    async function login() {
      if (!baseUrl()) {
        setMsg("loginMsg", "Paste Apps Script URL first", "error");
        return;
      }

      const code = document.getElementById("accessCode").value.trim();
      if (!code) {
        setMsg("loginMsg", "Enter access code", "error");
        return;
      }

      try {
        const res = await postJson({ action: "apiLogin", code });
        if (!res.ok) {
          setMsg("loginMsg", "Invalid code", "error");
          return;
        }
        currentRole = res.role;
        setMsg("loginMsg", "Logged in as " + res.role, "success");
        document.getElementById("panel").style.display = "block";
        loadDashboard();
      } catch (err) {
        setMsg("loginMsg", "Login failed", "error");
      }
    }

    async function checkIn(qrValue) {
      if (!baseUrl()) {
        setMsg("scanMsg", "Paste Apps Script URL first", "error");
        return;
      }
      if (!organizerName()) {
        setMsg("scanMsg", "Enter organizer name first", "error");
        return;
      }

      try {
        const url =
          baseUrl() +
          "?action=apiCheckIn" +
          "&qr=" + encodeURIComponent(qrValue) +
          "&organizer=" + encodeURIComponent(organizerName());

        const res = await jsonp(url);

        if (res.ok) {
          setMsg("scanMsg", "Checked in successfully", "success");
          document.getElementById("scanResult").innerHTML = renderPerson(res.attendee, "checked_in");
          loadDashboard();
          if (navigator.vibrate) navigator.vibrate(120);
          beep(900, 120);
          return;
        }

        if (res.status === "already_checked_in") {
          setMsg("scanMsg", "Already checked in", "warn");
          document.getElementById("scanResult").innerHTML = renderPerson(res.attendee, "already_checked_in");
          if (navigator.vibrate) navigator.vibrate([80, 80, 80]);
          beep(500, 160);
          return;
        }

        setMsg("scanMsg", "Attendee not found", "error");
        document.getElementById("scanResult").innerHTML = "";
        beep(250, 180);
      } catch (err) {
        setMsg("scanMsg", "Failed to connect", "error");
      }
    }

    function startCamera() {
      setMsg("scanMsg", "");

      if (cameraRunning) {
        setMsg("scanMsg", "Camera already running", "warn");
        return;
      }

      if (!window.Html5Qrcode) {
        setMsg("scanMsg", "QR library failed to load", "error");
        return;
      }

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 240, height: 240 } },
        async (decodedText) => {
          if (scanLocked) return;
          scanLocked = true;
          document.getElementById("manualQr").value = decodedText;
          await checkIn(decodedText);
          setTimeout(() => { scanLocked = false; }, 1500);
        },
        () => {}
      ).then(() => {
        cameraRunning = true;
        setMsg("scanMsg", "Camera started", "success");
      }).catch(err => {
        setMsg("scanMsg", "Camera error: " + String(err), "error");
      });
    }

    function stopCamera() {
      if (!scanner || !cameraRunning) {
        setMsg("scanMsg", "Camera is not running", "warn");
        return;
      }

      scanner.stop()
        .then(() => {
          cameraRunning = false;
          document.getElementById("reader").innerHTML = "";
          scanner = null;
          setMsg("scanMsg", "Camera stopped", "warn");
        })
        .catch(err => {
          setMsg("scanMsg", "Failed to stop camera: " + String(err), "error");
        });
    }

    function submitManual() {
      const qr = document.getElementById("manualQr").value.trim();
      if (!qr) {
        setMsg("scanMsg", "Enter QR / Attendee ID first", "error");
        return;
      }
      checkIn(qr);
    }

    async function runSearch() {
      const q = document.getElementById("searchQuery").value.trim();
      if (!q) return;

      try {
        const url = baseUrl() + "?action=apiSearch&query=" + encodeURIComponent(q);
        const rows = await jsonp(url);
        const box = document.getElementById("searchResults");
        if (!rows.length) {
          box.innerHTML = '<p class="muted">No results</p>';
          return;
        }
        box.innerHTML = rows.map(r => `
          <div class="person">
            <strong>${escapeHtml(r.name)}</strong>
            <div>${escapeHtml(r.attendeeId)}</div>
            <div>${escapeHtml(r.email || "")}</div>
            <div>${escapeHtml(r.whatsapp || "")}</div>
            <div>Status: ${r.checkedIn ? "Present" : "Not checked in"}</div>
            <div>Points: ${r.totalPoints}</div>
            <button onclick="manualCheckIn('${r.attendeeId}')">Manual Check-in</button>
          </div>
        `).join("");
      } catch (err) {
        document.getElementById("searchResults").innerHTML = '<p class="muted">Search failed</p>';
      }
    }

    async function manualCheckIn(attendeeId) {
      try {
        const res = await postJson({
          action: "apiManualCheckIn",
          attendeeId,
          organizer: organizerName()
        });

        if (res.ok) {
          alert("Checked in successfully");
        } else if (res.status === "already_checked_in") {
          alert("Already checked in");
        } else {
          alert("Not found");
        }

        runSearch();
        loadDashboard();
      } catch (err) {
        alert("Failed");
      }
    }

    async function submitWalkin() {
      const payload = {
        action: "apiWalkIn",
        data: {
          name: document.getElementById("w_name").value.trim(),
          email: document.getElementById("w_email").value.trim(),
          whatsapp: document.getElementById("w_whatsapp").value.trim(),
          university: document.getElementById("w_university").value.trim(),
          team: document.getElementById("w_team").value.trim(),
          roleInEvent: document.getElementById("w_role").value.trim(),
          age: document.getElementById("w_age").value.trim(),
          gender: document.getElementById("w_gender").value.trim(),
          government: document.getElementById("w_government").value.trim(),
          nationalId: document.getElementById("w_nationalId").value.trim(),
          educationProfile: document.getElementById("w_educationProfile").value.trim(),
          organizer: organizerName()
        }
      };

      try {
        const res = await postJson(payload);
        if (!res.ok) {
          setMsg("walkinMsg", res.status === "email_exists" ? "This email already exists" : "Failed", "error");
          return;
        }
        setMsg("walkinMsg", "Walk-in registered", "success");
        document.getElementById("walkinResult").innerHTML = renderPerson(res.attendee, "checked_in");
        loadDashboard();
      } catch (err) {
        setMsg("walkinMsg", "Walk-in failed", "error");
      }
    }

    async function loadDashboard() {
      try {
        const url = baseUrl() + "?action=apiDashboard";
        const data = await jsonp(url);

        document.getElementById("d_total").textContent = data.total;
        document.getElementById("d_checkedIn").textContent = data.checkedIn;
        document.getElementById("d_absent").textContent = data.absent;
        document.getElementById("d_attendanceRate").textContent = data.attendanceRate + "%";
        document.getElementById("d_absenceRate").textContent = data.absenceRate + "%";

        const latest = document.getElementById("latestList");
        latest.innerHTML = data.latest.length
          ? data.latest.map(x => `
            <div class="person">
              <strong>${escapeHtml(x.name)}</strong>
              <div>${escapeHtml(x.attendeeId)}</div>
              <div>${escapeHtml(String(x.time || ""))}</div>
              <div>${escapeHtml(String(x.method || ""))}</div>
              <div>Points: ${x.points}</div>
            </div>
          `).join("")
          : '<p class="muted">No check-ins yet</p>';
      } catch (err) {}
    }

    async function loadPresent() {
      try {
        const rows = await jsonp(baseUrl() + "?action=apiPresent");
        const q = document.getElementById("p_search").value.trim().toLowerCase();

        const filtered = q
          ? rows.filter(r =>
              [r.attendeeId, r.name, r.email, r.whatsapp].some(v =>
                String(v || "").toLowerCase().includes(q)
              )
            )
          : rows;

        document.getElementById("presentList").innerHTML = filtered.length
          ? filtered.map(r => `
            <div class="person">
              <strong>${escapeHtml(r.name)}</strong>
              <div>${escapeHtml(r.attendeeId)}</div>
              <div>${escapeHtml(r.email || "")}</div>
              <div>Check-in: ${escapeHtml(String(r.checkInTime || ""))}</div>
              <div>Points: ${r.totalPoints}</div>
              <button onclick="selectPoint('${r.attendeeId}')">Select</button>
            </div>
          `).join("")
          : '<p class="muted">No present attendees</p>';
      } catch (err) {
        document.getElementById("presentList").innerHTML = '<p class="muted">Failed</p>';
      }
    }

    function selectPoint(id) {
      document.getElementById("p_attendeeId").value = id;
    }

    async function submitPoints() {
      try {
        const res = await postJson({
          action: "apiAddPoints",
          attendeeId: document.getElementById("p_attendeeId").value.trim(),
          pointsDelta: document.getElementById("p_delta").value.trim(),
          reason: document.getElementById("p_reason").value.trim(),
          organizer: organizerName()
        });

        setMsg("pointsMsg", res.ok
          ? `Saved. Total points for ${res.attendee.name}: ${res.attendee.totalPoints}`
          : "Failed to save points",
          res.ok ? "success" : "error"
        );

        loadPresent();
        loadDashboard();
      } catch (err) {
        setMsg("pointsMsg", "Failed to save points", "error");
      }
    }

    function renderPerson(attendee, status) {
      let badge = '';
      if (status === "checked_in") badge = '<span class="badge ok">Checked in</span>';
      else if (status === "already_checked_in") badge = '<span class="badge warn">Already checked in</span>';
      else badge = '<span class="badge no">Unknown</span>';

      return `
        <div class="person">
          <strong>${escapeHtml(attendee.name || "")}</strong>
          <div>${escapeHtml(attendee.attendeeId || "")}</div>
          <div>${escapeHtml(attendee.email || "")}</div>
          <div>${escapeHtml(attendee.whatsapp || "")}</div>
          <div>Status: ${attendee.checkedIn ? "Present" : "Not checked in"}</div>
          <div>Check-in time: ${escapeHtml(String(attendee.checkInTime || ""))}</div>
          <div>Points: ${attendee.totalPoints || 0}</div>
          ${badge}
        </div>
      `;
    }

    function beep(freq = 800, duration = 120) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration / 1000);
        setTimeout(() => {
          osc.stop();
          ctx.close();
        }, duration);
      } catch (_) {}
    }
  </script>
</body>
</html>
